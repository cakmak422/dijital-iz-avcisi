name: Daily Cyber Event Refresh

on:
  schedule:
    # 00:00 Europe/Istanbul is 21:00 UTC while Turkey uses UTC+3.
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger protected daily cyber event endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL}/api/cron/daily-cyber-event"
