name: Diagnose Cyber News Fetch

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose fetch endpoint access
        env:
          NEWS_FETCH_SECRET: ${{ secrets.NEWS_FETCH_SECRET }}
        run: |
          if [ -z "$NEWS_FETCH_SECRET" ]; then
            echo "NEWS_FETCH_SECRET is missing"
            exit 1
          fi

          echo "Secret length: ${#NEWS_FETCH_SECRET}"

          echo "Test 1: latest public endpoint"
          curl -sS -o latest.txt -w "HTTP %{http_code}\n" "https://dijitalizavcisi.com/api/news/latest?limit=1"
          head -c 300 latest.txt || true
          echo ""

          echo "Test 2: fetch without secret"
          curl -sS -o nosecret.txt -w "HTTP %{http_code}\n" "https://dijitalizavcisi.com/api/news/fetch"
          head -c 300 nosecret.txt || true
          echo ""

          echo "Test 3: fetch with query secret encoded"
          curl -sS --get \
            --data-urlencode "secret=${NEWS_FETCH_SECRET}" \
            -o query.txt \
            -w "HTTP %{http_code}\n" \
            "https://dijitalizavcisi.com/api/news/fetch"
          head -c 300 query.txt || true
          echo ""

          echo "Test 4: fetch with Authorization header"
          curl -sS \
            -A "Mozilla/5.0 GitHubActions-DijitalIzAvcisi/1.0" \
            -H "Authorization: Bearer ${NEWS_FETCH_SECRET}" \
            -o header.txt \
            -w "HTTP %{http_code}\n" \
            "https://dijitalizavcisi.com/api/news/fetch"
          head -c 300 header.txt || true
          echo ""
