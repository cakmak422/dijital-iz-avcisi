services:
  - type: web
    name: dijital-iz-avcisi-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && playwright install --with-deps chromium"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: DATABASE_URL
        fromDatabase:
          name: dijital-iz-avcisi-db
          property: connectionString
      - key: ENABLE_PLAYWRIGHT_FALLBACK
        value: "true"
      - key: BACKEND_PUBLIC_URL
        value: https://dijital-iz-avcisi-api.onrender.com

databases:
  - name: dijital-iz-avcisi-db
    databaseName: dijital_iz_avcisi
    user: dijital_iz_avcisi
